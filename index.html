<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpriteTest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="game"></canvas>
    <div class="controls-bar">
        <p class="controls">Move: WASD / Arrows &nbsp; Run: Shift + Move &nbsp; Jump: Space &nbsp; Kick: E</p>
        <div class="effects-toggles">
            <span class="label">Effects:</span>
            <button id="toggle-dodgeball" class="effect-btn">Dodgeball: Off</button>
        </div>
    </div>
    <div class="sprite-selector">
        <span class="label">Character:</span>
        <div class="sprite-options" id="sprite-options"></div>
        <label class="upload-btn">
            Upload
            <input type="file" id="sprite-upload" accept="image/png" hidden>
        </label>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
